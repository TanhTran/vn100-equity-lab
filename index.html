       greens/reds) so the entire inline-styled app themes with no refactor. */
    html.theme-dark { filter: invert(1) hue-rotate(180deg); background: #fff; }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #d3d6dc; border-radius: 6px; border: 2px solid #f6f7f9; }
    ::-webkit-scrollbar-track { background: transparent; }

    .num { font-variant-numeric: tabular-nums; }
    .mono { font-family: 'Spline Sans Mono', monospace; }

    button { outline: none; }

      -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 2px;
    }

      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: oklch(0.62 0.16 264);
      cursor: pointer; border: 2px solid #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: oklch(0.62 0.16 264);
      cursor: pointer; border: 2px solid #fff;
    }

    select { outline: none; }
    select:focus { border-color: oklch(0.62 0.16 264) !important; }

    #app { height: 100%; width: 100%; }

    /* Desktop defaults for responsive helpers */
    .hamburger { display: none; }
    .nav-overlay { display: none; }

    /* ===================== MOBILE (phones / narrow) ===================== */
    @media (max-width: 820px) {
      /* Sidebar becomes a slide-in drawer */
      .sidebar {
        position: fixed !important; top: 0; left: 0; bottom: 0; z-index: 60;
        transform: translateX(-100%); transition: transform .25s ease;
        box-shadow: 2px 0 20px rgba(0,0,0,.35);
      }
      body.nav-open .sidebar { transform: translateX(0); }

      .nav-overlay {
        display: block; position: fixed; inset: 0; z-index: 50;
        background: rgba(0,0,0,.45); opacity: 0; pointer-events: none;
        transition: opacity .25s ease;
      }
      body.nav-open .nav-overlay { opacity: 1; pointer-events: auto; }

      /* Show the menu button, tighten the top bar */
      .hamburger { display: flex !important; }
      .topbar { padding: 0 12px !important; gap: 10px !important; }
      .topbar-search { width: auto !important; flex: 1 1 auto; min-width: 0; }
      .topbar-clock { display: none !important; }
      .topbar-sub { display: none; }

      /* Stack every multi-column grid into a single column */
      #app [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }

      /* Roomier tap targets & less wasted padding */
      .content-scroll { padding: 14px 12px 48px !important; }
    }
  </style>

5% QoQ / +17% YoY). Results were broadly in line with expectations: a sharp sequential rebound from the depressed 4Q25 base (when provisioning spiked 13x YoY). Asset quality remains best-in-class with NPL flat at 0.97%.",sections:[{title:"Details",paras:["Credit growth of +3.2% QoQ in 1Q26 was driven entirely by the corporate segment (+6.0% QoQ), while retail lending growth was muted at +0.8% QoQ. The bank expects credit to grow 6\u20137% in 2Q26.","Customer deposits declined by -2.7% QoQ as ACB re-routed funding into CD issuance (+17% QoQ) to support funding. LDR (per SBV definition) sits at 81.0%, comfortably below the 85% cap.","NII reached \u20AB7.0tn (-1% QoQ but +10% YoY) due to rising COF, which happened across banks. COF jumped +43bp QoQ / +85bp YoY to 4.14% on heavier CD issuance and softer CASA, while asset yield rose +34bp QoQ / +68bp YoY to 6.98%. Thus quarterly NIM contracted -10bp QoQ / -17bp YoY to 2.83%. Management expects NIM pressure to moderate as ACB shifts room to higher-yield loans; ST funding-for-MLT loans is just 24.9% (vs 30% cap), giving headroom to defend NIM.","Provisioning normalized to \u20AB686bn (-65% QoQ / +10% YoY), an annualized credit cost of just 0.39%. NPL was unchanged at 0.97% and LLR robust at 114%. One area to watch: Group 2 loans doubled QoQ to \u20AB5.0tn (0.71% of loans) \u2014 management characterized this as temporary, not broader stress.","Operating efficiency improved with CIR at 32% (-2ppt QoQ and YoY), as +13% YoY revenue growth outpaced +6% YoY opex growth. Capital is solid: ACB is among the first to adopt Circular 14, with consolidated CAR 12.6% and Tier-1 CAR 12.2%."]},{title:"Our view",paras:["The strong +55% QoQ profit rebound confirms our prior call that the 4Q25 provisioning spike was conservative risk management rather than fundamental deterioration \u2014 the cushion built last quarter now provides flexibility to absorb credit costs through 2026 without sacrificing earnings momentum.","NIM remains the key swing factor, but we expect stabilization in 2H26 as ACB optimizes loan tenor and shifts toward higher-yield loans such as real estate (just 5% of the book).","Maintain BUY. ACB trades at 1.1x 2026E P/B, in line with the sector median despite sector-leading asset quality and strong operational results. Our TP of \u20AB31,640 implies a 12M TSR (incl. dividend) of ~39%."]}],risks:"Deeper-than-expected NIM compression from deposit competition; sustained increase in Group 2 loan migration.",analyst:"Tanh Tran \u2014 Analyst (Banks), Yuanta Securities Vietnam"};var A7=["All","Banks","Property","Consumer","Materials","Brokers"],G1=e=>Math.round(e).toLocaleString("en-US"),G0=e=>e==null?"\u2014":(e>0?"+":"")+Math.round(e)+"%",O0=e=>e==null?m.mut:e>0?"oklch(0.5 0.14 162)":e<0?"oklch(0.6 0.18 25)":m.mut,k7=e=>e==null?"\u2014":(e>0?"+":"")+e+"bp";function m3(){return L1.map(e=>{let t=I0(e.t)||{},n=e.spark,o=n[7],a=n[6],r=n[3],i=a?(o-a)/Math.abs(a)*100:null,s=r?(o-r)/Math.abs(r)*100:null,p=n[2]?(a-n[2])/Math.abs(n[2])*100:null,c=s!=null&&p!=null?s>p+5?"accel":s<p-5?"slow":"steady":"steady",d=t.upside;return{t:e.t,name:t.n||e.t,sector:e.sector,patmi:o,qoq:i,yoy:s,spark:n,mom:c,rating:t.verdict||"\u2014",price:t.price||0,tp:t.price&&d!=null?Math.round(t.price*(1+d/100)/100)*100:null,upside:d}})}function C7(){let e=H(),t=(e.earnSearch||"").trim().toLowerCase();return m3().filter(n=>(e.earnSector==="All"||!e.earnSector||n.sector===e.earnSector)&&(!t||n.t.toLowerCase().includes(t)||n.name.toLowerCase().includes(t)))}function s2(e,t=30,n=76){let o="http://www.w3.org/2000/svg",a=document.createElementNS(o,"svg");a.setAttribute("viewBox",`0 0 ${n} ${t}`),a.style.cssText=`width:${n}px;height:${t}px;display:block;overflow:visible`;let r=Math.min(...e),i=Math.max(...e),s=e.length,p=(n-(s-1)*2)/s,c=i>0&&r<0?t*(i/(i-r)):r<0?0:t;return e.forEach((d,h)=>{let y=h*(p+2),u=i===r?4:t*(1-(d-r)/(i-r)),f=Math.min(c,u),v=Math.max(2,Math.abs(u-c)),k=document.createElementNS(o,"rect");k.setAttribute("x"
