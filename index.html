<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VN100 Equity Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Archivo', system-ui, sans-serif; color: #1c1d22; background: #f6f7f9; }

    /* Dark mode: luminance inversion at the root (invert + hue-rotate ~preserves
       greens/reds) so the entire inline-styled app themes with no refactor. */
    html.theme-dark { filter: invert(1) hue-rotate(180deg); background: #fff; }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #d3d6dc; border-radius: 6px; border: 2px solid #f6f7f9; }
    ::-webkit-scrollbar-track { background: transparent; }

    .num { font-variant-numeric: tabular-nums; }
    .mono { font-family: 'Spline Sans Mono', monospace; }

    button { outline: none; }
    button:focus-visible { outline: 2px solid oklch(0.62 0.16 264); outline-offset: 2px; }

    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 2px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: oklch(0.62 0.16 264);
      cursor: pointer; border: 2px solid #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: oklch(0.62 0.16 264);
      cursor: pointer; border: 2px solid #fff;
    }

    select { outline: none; }
    select:focus { border-color: oklch(0.62 0.16 264) !important; }

    #app { height: 100%; width: 100%; }

    /* Desktop defaults for responsive helpers */
    .hamburger { display: none; }
    .nav-overlay { display: none; }

    /* ===================== MOBILE (phones / narrow) ===================== */
    @media (max-width: 820px) {
      /* Sidebar becomes a slide-in drawer */
      .sidebar {
        position: fixed !important; top: 0; left: 0; bottom: 0; z-index: 60;
        transform: translateX(-100%); transition: transform .25s ease;
        box-shadow: 2px 0 20px rgba(0,0,0,.35);
      }
      body.nav-open .sidebar { transform: translateX(0); }

      .nav-overlay {
        display: block; position: fixed; inset: 0; z-index: 50;
        background: rgba(0,0,0,.45); opacity: 0; pointer-events: none;
        transition: opacity .25s ease;
      }
      body.nav-open .nav-overlay { opacity: 1; pointer-events: auto; }

      /* Show the menu button, tighten the top bar */
      .hamburger { display: flex !important; }
      .topbar { padding: 0 12px !important; gap: 10px !important; }
      .topbar-search { width: auto !important; flex: 1 1 auto; min-width: 0; }
      .topbar-clock { display: none !important; }
      .topbar-sub { display: none; }

      /* Stack every multi-column grid into a single column */
      #app [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }

      /* Roomier tap targets & less wasted padding */
      .content-scroll { padding: 14px 12px 48px !important; }
    }

    /* ===================== PRINT (Export PDF for earnings notes) ===================== */
    @media print {
      /* Cancel the dark-mode inversion so the note prints on white */
      html.theme-dark { filter: none !important; background: #fff !important; }
      html, body { height: auto !important; overflow: visible !important; background: #fff !important; }
      /* Hide the app chrome and everything not part of the note */
      .sidebar, .topbar, .nav-overlay, .hamburger, .earn-no-print { display: none !important; }
      #app, main, .content-scroll, .main-area { height: auto !important; overflow: visible !important; padding: 0 !important; margin: 0 !important; display: block !important; width: auto !important; }
      /* The note fills the page as a clean sheet */
      .earn-note { border: none !important; border-radius: 0 !important; box-shadow: none !important; max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
      .earn-note-body { grid-template-columns: 230px 1fr !important; gap: 26px !important; }
      /* Keep colours and avoid awkward mid-element page breaks */
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .earn-note table, .earn-note h2 { break-inside: avoid; }
      @page { margin: 14mm; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { mount } from './src/app.js';
    import { setState } from './src/state.js';

    // Apply persisted theme before mount (avoids a light flash).
    try { if (localStorage.getItem('vn100_theme') === 'dark') document.documentElement.classList.add('theme-dark'); } catch (e) {}

    // Apply any deep-link hash (#screen or #screen/TICKER) before mount
    const hash = window.location.hash.slice(1);
    if (hash) {
      const [screen, ticker] = hash.split('/');
      if (screen && ticker) setState({ screen, selected: ticker });
      else if (screen) setState({ screen });
    }

    mount(document.getElementById('app'));

    // Reload on manual hash changes so deep links stay in sync
    window.addEventListener('hashchange', () => location.reload());
  </script>
</body>
</html>
